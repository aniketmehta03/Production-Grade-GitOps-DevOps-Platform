name: Build and Push

on:
    push:
        branches:
            - main

jobs:
    docker:
        runs-on: ubuntu-latest

        steps:

        # Checkout code
        - name: Checkout code
          uses: actions/checkout@v3

        # Login Docker Hub
        - name: Login to Docker hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        # Build Image
        - name: Build docker image
          run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/crud-api:${{ github.sha }} .

        # Push Image
        - name: Push Image to docker hub
          run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/crud-api:${{ github.sha }}