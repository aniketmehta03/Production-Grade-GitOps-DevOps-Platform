apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  DB_HOST: "{{ .Values.backendConfig.DB_HOST | default "postgres" }}"
  DB_PORT: "{{ .Values.backendConfig.DB_PORT | default "5432" }}"
  DB_NAME: "{{ .Values.postgres.db.name }}"
  DB_USER: "{{ .Values.postgres.db.user }}"
  DATABASE_URL: "postgresql://{{ .Values.postgres.db.user }}:{{ .Values.postgres.db.password }}@{{ .Values.backendConfig.DB_HOST | default "postgres" }}:{{ .Values.backendConfig.DB_PORT | default "5432" }}/{{ .Values.postgres.db.name }}"


